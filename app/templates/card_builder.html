{% extends "base.html" %}

{% block title %}单卡制作页{% endblock %}

{% block content %}
<main class="page-shell">
    <section class="panel builder-page-header">
        <div class="panel-header">
            <div>
                <p class="panel-kicker">制作</p>
                <h2>单张卡牌制作 / 修改</h2>
            </div>
            <a class="secondary-link-button" href="{{ url_for('main.index') }}">返回卡组页</a>
        </div>
        <p class="server-panel-copy">
            这个页面按 Unity 的 Card Editor 结构组织：基础信息、Effects、校验和 JSON 面板。
            文件名会根据 <code>card.id</code> 自动生成成 <code>card_&lt;id&gt;.json</code>。
        </p>
    </section>

    <section class="builder-layout">
        <aside class="panel builder-sidebar">
            <div class="panel-header">
                <div>
                    <p class="panel-kicker">卡牌文件</p>
                    <h2>data/cards</h2>
                </div>
                <button id="builder-reload-button" class="secondary-button" type="button">刷新列表</button>
            </div>
            <input id="builder-search" class="search-input builder-search-input" type="search" placeholder="搜索文件名或卡名">
            <div id="builder-card-list" class="card-list"></div>
        </aside>

        <section class="panel builder-editor-panel">
            <div class="panel-header">
                <div>
                    <p class="panel-kicker">编辑器</p>
                    <h2 id="builder-title">新建或选择一张卡牌</h2>
                </div>
                <div id="builder-status" class="status-message">等待操作</div>
            </div>

            <div class="builder-toolbar">
                <button id="builder-new-button" class="secondary-button" type="button">新建</button>
                <button id="builder-save-button" class="primary-button" type="button">保存到 data/cards</button>
            </div>

            <div class="builder-form-row">
                <label class="editor-field">
                    <span>文件名</span>
                    <input id="builder-file-name" type="text" placeholder="会根据卡牌 id 自动生成" readonly>
                </label>
            </div>

            <div id="builder-structured-editor" class="builder-structured-editor"></div>

            <section class="builder-json-panel">
                <div class="panel-header builder-inline-header">
                    <div>
                        <p class="panel-kicker">JSON</p>
                        <h2>JSON Panel</h2>
                    </div>
                    <div class="builder-toolbar">
                        <button id="builder-refresh-json-button" class="secondary-button" type="button">刷新 JSON</button>
                    </div>
                </div>
                <textarea id="builder-json-editor" class="builder-json-editor" spellcheck="false"></textarea>
            </section>
        </section>
    </section>
</main>

<script src="{{ url_for('static', filename='js/card_builder.js') }}"></script>
{% endblock %}
